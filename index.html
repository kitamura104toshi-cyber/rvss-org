<html lang="ja">

<meta charset="UTF-8" />

<style>
  :root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --border: #e5e3dc;
    --text: #2a2a2a;
    --muted: #6b6b6b;
    --accent: #4f63d2;
    --accent-soft: #e8ecff;
    --pink: #fde9ec;
    --pink-text: #b73a4a;
    --green: #e6f4ea;
    --green-text: #2f7d4a;
    --orange: #fff1de;
    --orange-text: #a8631b;
    --blue: #e8ecff;
    --blue-text: #4f63d2;
    --purple: #efe6f7;
    --purple-text: #6a3e9a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1440px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 22px; margin: 0 0 16px; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .stat .num { font-size: 26px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
  }
  .tab.active { background: var(--text); color: white; border-color: var(--text); }
  .tab-remove {
    margin-left: 6px;
    opacity: 0.6;
  }
  .tab-remove:hover { opacity: 1; }
  .tab-add {
    background: #fff;
    border: 1px dashed var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
  }
  .tab-add:hover { background: #f0eee7; }

  .grid {
    column-count: 2;
    column-gap: 16px;
  }
  .grid > .card {
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
    page-break-inside: avoid;
    margin-bottom: 16px;
    display: inline-block;
    width: 100%;
  }
  @media (max-width: 560px) {
    .grid { column-count: 1; }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card-title { font-weight: 700; font-size: 16px; }
  .count-pill {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 999px;
  }
  .section-label { font-size: 12px; color: var(--muted); margin: 10px 0 6px; }

  .slot {
    background: #faf9f5;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .slot .name { font-size: 14px; font-weight: 600; }
  .slot .role { font-size: 11px; color: var(--muted); margin-top: 2px; }
  body:not(.view-mode) .slot[data-reorder-key] { cursor: grab; touch-action: none; }
  .slot.dragging { opacity: 0.5; cursor: grabbing; }
  .reorder-ghost {
    position: fixed;
    z-index: 999;
    pointer-events: none;
    transform: translate(-50%, -100%);
    background: var(--text);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    white-space: nowrap;
  }
  .card.highlight-flash {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
    transition: outline-color 1.4s ease-out;
  }
  .name-link { cursor: pointer; }
  .name-link:hover { text-decoration: underline; }
  .slot.empty {
    background: #fff;
    border-style: dashed;
    color: var(--muted);
    cursor: pointer;
    justify-content: center;
    font-size: 13px;
  }
  .slot.empty:hover { background: #f0eee7; }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .tag.pj { background: var(--blue); color: var(--blue-text); }
  .tag.role-統括 { background: var(--purple); color: var(--purple-text); }
  .tag.role-副統括 { background: var(--blue); color: var(--blue-text); }
  .tag.role-TL { background: var(--green); color: var(--green-text); }
  .tag.role-メンバー { background: #f0eee7; color: var(--muted); }
  .tag.editable { cursor: pointer; }
  .tag.editable:hover { outline: 1px solid var(--accent); outline-offset: 1px; }

  /* ===== 閲覧モード ===== */
  body.view-mode .editor-only { display: none !important; }
  body.view-mode .tag.editable { cursor: default; pointer-events: none; }
  body.view-mode .tag.editable:hover { outline: none; }
  body.view-mode .card-title[onclick],
  body.view-mode .group-title[onclick],
  body.view-mode .subgroup-title[onclick] { cursor: default !important; pointer-events: none; }
  .mode-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
    font-weight: 600;
  }
  .mode-badge.view { background: #e8ecff; color: var(--blue-text); }
  .mode-badge.edit { background: #fff1de; color: var(--orange-text); }

  .icon-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .icon-btn:hover { background: #f0eee7; color: var(--pink-text); }

  .btn {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn:hover { background: #f0eee7; }
  .btn.primary { background: var(--text); color: white; border-color: var(--text); }
  .btn-add {
    width: 100%;
    margin-top: 8px;
    background: #fff;
    border: 1px dashed var(--border);
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
  }
  .btn-add:hover { background: #f0eee7; }

  .kpi-depts { display: flex; flex-direction: column; gap: 16px; }
  .kpi-groups-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    align-items: start;
  }
  .kpi-groups-grid > .group-box,
  .kpi-groups-grid > .subgroup-box { margin-top: 0; }
  @media (max-width: 720px) {
    .kpi-groups-grid { grid-template-columns: 1fr; }
  }

  .group-box {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 12px;
    background: #fcfbf6;
  }
  .group-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--border);
  }
  .group-title { font-weight: 700; font-size: 14px; color: var(--text); }
  .subgroup-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    margin-top: 8px;
    background: #fff;
  }
  .subgroup-title { font-weight: 600; font-size: 13px; color: var(--muted); }

  .dept-card { border-top: 4px solid var(--accent); }
  .dept-card.代表補佐室 { border-top-color: #6a3e9a; }
  .dept-card.人事 { border-top-color: #2f7d4a; }
  .dept-card.広報 { border-top-color: #b73a4a; }
  .dept-card.総務情シス { border-top-color: #a8631b; }
  .dept-card.エリア { border-top-color: #4f63d2; }
  .dept-card.スクール { border-top-color: #6a3e9a; }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 12px; padding: 20px;
    width: 90%; max-width: 420px; max-height: 80vh; overflow: auto;
  }
  .modal h3 { margin: 0 0 12px; font-size: 16px; }
  .modal input, .modal select, .modal textarea {
    width: 100%; padding: 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; margin-bottom: 10px;
    font-family: inherit;
  }
  .modal textarea { resize: vertical; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .member-pick {
    padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 14px;
    border: 1px solid transparent;
  }
  .member-pick:hover { background: var(--accent-soft); }

  .unassigned-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--pink); color: var(--pink-text);
    padding: 6px 12px; border-radius: 999px; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip.onbo { background: var(--orange); color: var(--orange-text); }
  .warn {
    font-size: 12px; color: var(--pink-text); margin-top: 8px;
  }
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .search {
    padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; min-width: 200px;
    font-family: inherit;
  }
</style>
</head>

function normalizeMemberList(list) {
  return (list || []).map(item => typeof item === "string" ? { name: item, role: "" } : item);
}
function ensureFields(s) {
  if (!s.deletedMembers) s.deletedMembers = [];
  if (!s.memberOverrides) s.memberOverrides = {};
  if (!s.customTabs) s.customTabs = [];
  if (!s.kpiDepts) s.kpiDepts = JSON.parse(JSON.stringify(KPI_DEPTS_SEED));
  (s.projects || []).forEach(p => {
    p.mentors = normalizeMemberList(p.mentors);
    p.students = normalizeMemberList(p.students);
  });
  return s;
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return ensureFields(JSON.parse(raw));
  } catch(e){}
  return ensureFields(JSON.parse(JSON.stringify(INITIAL)));
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  pushToSupabase();
}

// Supabase リアルタイム購読：他端末・他ユーザーの変更を即反映
function applyRemote(remote) {
  if (!remote) return;
  if (JSON.stringify(remote) === JSON.stringify(state)) {
    setStatus("✅ 同期済み", "#2f7d4a");
    return;
  }
  state = ensureFields(remote);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
  setStatus("✅ 同期済み", "#2f7d4a");
}

// 初回ロード：現在のクラウド側の値を取得
sb.from("org_state").select("data").eq("id", ROW_ID).maybeSingle()
  .then(({ data: row, error }) => {
    if (error) {
      setStatus("❌ 接続エラー: " + error.message, "#b73a4a");
      return;
    }
    if (!row) {
      // 初回：現在のローカル state をクラウドにアップロード
      pushToSupabase();
      return;
    }
    applyRemote(row.data);
  });

// リアルタイム購読：以降の変更を即反映
sb.channel("org_state_changes")
  .on("postgres_changes", { event: "*", schema: "public", table: "org_state", filter: `id=eq.${ROW_ID}` }, payload => {
    applyRemote(payload.new && payload.new.data);
  })
  .subscribe(status => {
    if (status === "CHANNEL_ERROR") setStatus("❌ 接続エラー", "#b73a4a");
  });
function resetData() {
  inputDialog(
    "初期データに戻します。現在のデータは自動でバックアップされます。続行するには「初期化」と入力してください。",

      if (v !== "初期化") { alert("入力が「初期化」と一致しなかったため中止しました。"); return; }
      exportJSON(); // 上書き前の自動バックアップ
      state = ensureFields(JSON.parse(JSON.stringify(INITIAL)));
      save(); render();
    }
  );
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});

}

function allAssignedNames() {
  const set = new Set();
  state.projects.forEach(p => {
    (p.mentors||[]).forEach(m => set.add(m.name));
    (p.students||[]).forEach(m => set.add(m.name));
  });
  return set;
}
function getStats() {
  const pjAssigned = new Set();
  state.projects.forEach(p => (p.students||[]).forEach(m => pjAssigned.add(m.name)));
  const communityNames = new Set();
  state.departments.forEach(d => {
    (d.lead||[]).forEach(m => communityNames.add(m.name));
    (d.groups||[]).forEach(g => {
      g.members.forEach(m => communityNames.add(m.name));
      (g.subGroups||[]).forEach(sg => sg.members.forEach(m => communityNames.add(m.name)));
    });
  });
  const allMembers = new Set(state.members);
  Object.keys(MEMBER_INFO).forEach(n => {
    const alt = n.replace(/﨑/g, "崎");
    const alt2 = n.replace(/崎/g, "﨑");
    if (!allMembers.has(n) && !allMembers.has(alt) && !allMembers.has(alt2)) {
      allMembers.add(n);
    }
  });
  return {
    projects: state.projects.length,
    pjAssign: pjAssigned.size,
    community: communityNames.size,
    onbo: state.onboarding.length,
    unassigned: state.unassigned.length,
    total: allMembers.size,
  };
}

// ====== 長押しドラッグでの並び替え ======
function reorderData(ref, idx) {
  const key = [ref.type, ref.pi, ref.gi, ref.sgi, ref.di, ref.path ? ref.path.join(".") : null]
    .filter(v => v !== undefined && v !== null).join(":");
  return `data-reorder='${JSON.stringify(ref)}' data-reorder-idx="${idx}" data-reorder-key="${key}"`;
}
function getReorderableArray(ref) {
  switch (ref.type) {
    case "projectMentors": return state.projects[ref.pi].mentors;
    case "projectStudents": return state.projects[ref.pi].students;
    case "projectGroupMembers": return state.projects[ref.pi].groups[ref.gi].members;
    case "deptLead": return state.departments[ref.di].lead;
    case "deptGroupMembers": return state.departments[ref.di].groups[ref.gi].members;
    case "deptSubGroupMembers": return state.departments[ref.di].groups[ref.gi].subGroups[ref.sgi].members;
    case "kpiDeptLead": return state.kpiDepts[ref.di].lead;
    case "kpiGroupMembers": return getKpiGroupNode(state.kpiDepts[ref.di], ref.path).members;
    default: return null;
  }
}
function reorderItem(ref, fromIndex, toIndex) {
  const arr = getReorderableArray(ref);
  if (!arr || fromIndex === toIndex || fromIndex == null || toIndex == null) { render(); return; }
  const [item] = arr.splice(fromIndex, 1);
  arr.splice(toIndex, 0, item);
  save(); render();
}

(function setupReorderDrag() {
  const LONG_PRESS_MS = 350;
  const MOVE_CANCEL_PX = 8;
  let pressTimer = null;
  let startX = 0, startY = 0;

  function cleanupPress() {
    clearTimeout(pressTimer);
    document.removeEventListener("pointermove", onPreDragMove);
    document.removeEventListener("pointerup", onPreDragUp);
  }
  function onPreDragMove(e) {
    if (Math.abs(e.clientX - startX) > MOVE_CANCEL_PX || Math.abs(e.clientY - startY) > MOVE_CANCEL_PX) cleanupPress();
  }
  function onPreDragUp() { cleanupPress(); }

  document.addEventListener("pointerdown", (e) => {
    if (typeof isEditMode !== "undefined" && !isEditMode) return;
    if (e.target.closest("button, .tag, input, textarea, select")) return;
    const slotEl = e.target.closest(".slot[data-reorder-key]");
    if (!slotEl) return;
    startX = e.clientX; startY = e.clientY;
    document.addEventListener("pointermove", onPreDragMove);
    document.addEventListener("pointerup", onPreDragUp, { once: true });
    pressTimer = setTimeout(() => {
      cleanupPress();
      beginReorderDrag(slotEl, e);
    }, LONG_PRESS_MS);
  });

  function beginReorderDrag(slotEl, e) {
    slotEl.classList.add("dragging");
    document.body.style.userSelect = "none";
    try { slotEl.setPointerCapture(e.pointerId); } catch (err) {}
    const key = slotEl.dataset.reorderKey;

    const nameText = (slotEl.querySelector(".name")?.textContent || "").trim();
    const ghost = document.createElement("div");
    ghost.className = "reorder-ghost";
    ghost.textContent = nameText;
    document.body.appendChild(ghost);
    const positionGhost = (x, y) => {
      ghost.style.left = x + "px";
      ghost.style.top = (y - 36) + "px";
    };
    positionGhost(e.clientX, e.clientY);

    const onMove = (ev) => {
      positionGhost(ev.clientX, ev.clientY);
      const siblings = Array.from(document.querySelectorAll(`.slot[data-reorder-key="${key}"]`)).filter(el => el !== slotEl);
      let after = null, closestOffset = -Infinity;
      siblings.forEach(sib => {
        const box = sib.getBoundingClientRect();
        const offset = ev.clientY - box.top - box.height / 2;
        if (offset < 0 && offset > closestOffset) { closestOffset = offset; after = sib; }
      });
      const parent = slotEl.parentElement;
      if (after) parent.insertBefore(slotEl, after);
      else parent.appendChild(slotEl);
    };
    const onUp = () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      slotEl.classList.remove("dragging");
      document.body.style.userSelect = "";
      ghost.remove();
      const ref = JSON.parse(slotEl.dataset.reorder);
      const fromIndex = parseInt(slotEl.dataset.reorderIdx, 10);
      const toIndex = Array.from(document.querySelectorAll(`.slot[data-reorder-key="${key}"]`)).indexOf(slotEl);
      reorderItem(ref, fromIndex, toIndex);
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp, { once: true });
  }
})();

// ====== KPI責任範囲・担当者マップ ======
// 部署カードの見た目は「コミュニティ運営」タブと同じ group-box/subgroup-box を流用しつつ、
// グループは無制限に入れ子にできる再帰構造にしている（環境>インプット>基礎カリキュラム のようにいくらでも深くできる）。
// 担当者は正式なメンバー名簿に限らないため、pickMember ではなく自由入力にしている。
// pathはKPI部署 d.groups をルートとした子インデックスの配列（例：[2,1,0]）
function getKpiGroupNode(dept, path) {
  let node = { children: dept.groups };
  for (const i of path) node = node.children[i];
  return node;
}
function getKpiGroupParentArray(dept, path) {
  let arr = dept.groups;
  for (let i = 0; i < path.length - 1; i++) arr = arr[path[i]].children;
  return arr;
}
function kpiDeptTotal(d) {
  const lead = (d.lead||[]).length;
  const countNode = (n) => (n.members||[]).length + (n.children||[]).reduce((s,c)=>s+countNode(c),0);
  return lead + (d.groups||[]).reduce((s,g)=>s+countNode(g), 0);
}
function renderKpiDept(d, i) {
  const leadRows = (d.lead||[]).map((m, li) => `
    <div class="slot" ${reorderData({type:"kpiDeptLead", di:i}, li)}>

      </div>
    </div>
  `).join("");

  const groupBlocks = (d.groups||[]).map((g, gi) => renderKpiGroupNode(g, i, [gi], 0)).join("");

  return `
    <div class="card dept-card">
      <div class="card-head">

      <div class="kpi-groups-grid" style="margin-top:12px">${groupBlocks}</div>
      <button class="btn-add editor-only" onclick="addKpiGroup(${i})" style="margin-top:12px;border-style:solid;background:var(--accent-soft);color:var(--accent)">+ グループを追加</button>

  `;

function renderKpiGroupNode(node, deptIdx, path, depth) {
  const pathStr = JSON.stringify(path);
  const boxClass = depth === 0 ? "group-box" : "subgroup-box";
  const titleClass = depth === 0 ? "group-title" : "subgroup-title";
  const memberRows = (node.members||[]).map((m, mi) => `
    <div class="slot" ${reorderData({type:"kpiGroupMembers", di:deptIdx, path}, mi)}>
      <div><div class="name name-link" onclick='goToMemberCard("${m.name}")' title="クリックでメンバーカードへ">${escapeHtml(m.name)}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="tag editable" onclick='editSlotMember({type:"kpiGroupMembers",di:${deptIdx},path:${pathStr}},${mi})' title="クリックで編集">${m.role ? escapeHtml(m.role) : "＋タグ"}</span>
        <button class="icon-btn editor-only" onclick='removeKpiGroupNodeMember(${deptIdx},${pathStr},${mi})'>×</button>
      </div>
    </div>
  `).join("");
  const childBlocks = (node.children||[]).map((c, ci) => renderKpiGroupNode(c, deptIdx, [...path, ci], depth+1)).join("");
  return `
    <div class="${boxClass}">
      <div class="group-head">
        <div class="${titleClass}" onclick='renameKpiGroupNode(${deptIdx},${pathStr})' title="クリックで名前変更" style="cursor:pointer">${escapeHtml(node.name)}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="count-pill">${(node.members||[]).length}名</span>
          <button class="icon-btn editor-only" onclick='deleteKpiGroupNode(${deptIdx},${pathStr})' title="削除">×</button>
        </div>
      </div>
      ${memberRows}
      <button class="btn-add editor-only" onclick='addKpiGroupNodeMember(${deptIdx},${pathStr})'>+ 担当者を追加</button>
      ${childBlocks}
      <button class="btn-add editor-only" onclick='addKpiGroupNodeChild(${deptIdx},${pathStr})' style="margin-top:8px;border-style:solid;background:#f0eee7">+ 小グループを追加</button>
    </div>
  `;
}

// 全メンバーごとに「プロジェクト/コミュニティ運営/スクール/オンボ/未アサイン」を集計したマップを返す
function buildMemberMap() {
  const map = {};
  const ensure = (n) => { if(!map[n]) map[n]={pjs:[],depts:[],onbo:false,unassigned:false,schools:[]}; if(!map[n].schools) map[n].schools=[]; return map[n]; };
  state.members.forEach(n => { if (!isDeleted(n)) ensure(n); });
  // Google Sheets由来のメンバーも追加（未登録分・未削除分）
  Object.keys(MEMBER_INFO).forEach(n => {
    if (isDeleted(n)) return;
    const alt = n.replace(/﨑/g, "崎");
    const alt2 = n.replace(/崎/g, "﨑");
    if (!map[n] && !map[alt] && !map[alt2]) ensure(n);
  });
  state.projects.forEach(p => {
    p.students.forEach(m => { ensure(m.name).pjs.push(p.name+(m.role?"("+m.role+")":"")); });
    (p.groups||[]).forEach(g => g.members.forEach(m => { ensure(m.name).pjs.push(p.name+"/"+g.name+(m.role?"("+m.role+")":"")); }));
  });
  state.departments.forEach(d => {
    (d.lead||[]).forEach(m => { ensure(m.name).depts.push(d.name+"/"+m.role); });
    (d.groups||[]).forEach(g => {
      g.members.forEach(m => { ensure(m.name).depts.push(d.name+"/"+g.name+(m.role?"("+m.role+")":"")); });
      (g.subGroups||[]).forEach(sg => sg.members.forEach(m => { ensure(m.name).depts.push(d.name+"/"+g.name+"/"+sg.name+(m.role?"("+m.role+")":"")); }));
    });
  });
  (state.schools||[]).forEach(s => {
    const add = (n, role) => { ensure(n).schools.push(s.name+"/"+role); };
    if (s.tl) add(s.tl, "TL");
    if (s.subTl) add(s.subTl, "副TL");
    s.students.forEach(n => add(n, "受講"));
  });
  state.onboarding.forEach(n => { ensure(n).onbo=true; });
  state.unassigned.forEach(n => { ensure(n).unassigned=true; });
  return map;
}

function renderAll() {
  const q = allFilterSearch.trim();
  const map = buildMemberMap();

  // エリア集計
  const areaCounts = {};
  Object.keys(map).forEach(n => {
    const mi = memberInfo(n);
    if (mi && mi.area) areaCounts[mi.area] = (areaCounts[mi.area]||0) + 1;
  });
  const areaSummary = AREA_LIST.filter(a => areaCounts[a]).map(a => {
    const c = AREA_COLORS[a];
    const active = allFilterArea === a;
    const style = `background:${c.bg};color:${c.fg};font-size:13px;padding:6px 14px;cursor:pointer;${active?'outline:2px solid '+c.fg+';outline-offset:1px;font-weight:700':''}`;
    return `<span class="tag" style="${style}" onclick="onAllAreaChange('${active?'':a}')">${a} ${areaCounts[a]}</span>`;
  }).join(" ");
  const clearChip = allFilterArea
    ? ` <span class="tag" style="background:#fff;color:#6b6b6b;border:1px solid #e5e3dc;font-size:12px;padding:6px 12px;cursor:pointer" onclick="onAllAreaChange('')">エリア絞り込みを解除</span>`
    : "";

  // アサイン状況フィルター（「どこにも未所属」はBSメンバー〈学生ではないメンター等〉を対象外にする）
  const assignDefs = [
    { id: "noPj",        label: "プロジェクト未所属", test: (i, n) => i.pjs.length === 0 },
    { id: "noCommunity", label: "コミュニティ運営なし", test: (i, n) => i.depts.length === 0 },
    { id: "noAny",       label: "どこにも未所属",     test: (i, n) => i.pjs.length === 0 && i.depts.length === 0 && (i.schools||[]).length === 0 && !(memberInfo(n)||{}).isBS },
  ];
  const assignDef = assignDefs.find(d => d.id === allFilterAssign);
  const assignSummary = assignDefs.map(d => {
    const count = Object.entries(map).filter(([n, i]) => d.test(i, n)).length;
    const active = allFilterAssign === d.id;
    const style = `background:${active?'#2a2a2a':'#fff'};color:${active?'#fff':'#6b6b6b'};border:1px solid ${active?'#2a2a2a':'#e5e3dc'};font-size:13px;padding:6px 14px;cursor:pointer;${active?'font-weight:700':''}`;
    return `<span class="tag" style="${style}" onclick="onAllAssignChange('${d.id}')">${d.label} ${count}</span>`;
  }).join(" ");

  // スキルフィルター（大分類チップのみ表示）。各メンバーに手動で分類済みの
  // memberInfo.skillCategories があればそれを優先し、なければカテゴリ内のいずれかの
  // キーワードが memberInfo.skills の自由記述に含まれるかで判定する（フォールバック）。
  const hasSkillCategory = (n, categoryName) => {
    const cat = SKILL_CATEGORIES.find(c => c.name === categoryName);
    const mi = memberInfo(n);
    if (!cat || !mi) return false;
    if (mi.skillCategories) return mi.skillCategories.includes(categoryName);
    if (!mi.skills) return false;
    return cat.keywords.some(k => mi.skills.includes(k));
  };
  const skillCounts = {};
  Object.keys(map).forEach(n => {
    SKILL_CATEGORIES.forEach(c => { if (hasSkillCategory(n, c.name)) skillCounts[c.name] = (skillCounts[c.name]||0) + 1; });
  });
  const skillSummary = SKILL_CATEGORIES.map(c => {
    const active = allFilterSkill === c.name;
    const count = skillCounts[c.name] || 0;
    const style = `background:${active?'#2a2a2a':'#fff'};color:${active?'#fff':'#6b6b6b'};border:1px solid ${active?'#2a2a2a':'#e5e3dc'};font-size:13px;padding:6px 14px;cursor:pointer;${active?'font-weight:700':''}`;
    return `<span class="tag" style="${style}" onclick="onAllSkillChange('${c.name}')" title="${escapeHtml(c.keywords.join('・'))}">${c.name} ${count}</span>`;
  }).join(" ");

  const filtered = Object.entries(map)
    .filter(([n]) => {
      if (!q) return true;
      if (n.includes(q)) return true;
      const mi = memberInfo(n) || {};
      return [mi.experience, mi.skills, mi.canDo, mi.wantToDo].some(v => v && v.includes(q));
    })
    .filter(([n]) => {
      if (!allFilterArea) return true;
      const mi = memberInfo(n);
      return mi && mi.area === allFilterArea;
    })
    .filter(([n, info]) => !assignDef || assignDef.test(info, n))
    .filter(([n]) => !allFilterSkill || hasSkillCategory(n, allFilterSkill))
    .sort(([a],[b]) => a.localeCompare(b,"ja"));

  // BSメンバー（学生メンバーではないため別枠にする）
  const isBSName = (n) => !!(memberInfo(n) || {}).isBS;
  const regularFiltered = filtered.filter(([n]) => !isBSName(n));
  const bsFiltered = filtered.filter(([n]) => isBSName(n));

  const cards = regularFiltered.map(([n,info]) => renderMemberCard(n, info)).join("");
  const bsSection = bsFiltered.length > 0 ? `
    <div style="margin-top:24px;padding-top:16px;border-top:1px dashed var(--border)">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">BSメンバー（${bsFiltered.length}名）</div>
      <div class="grid">${bsFiltered.map(([n,info]) => renderMemberCard(n, info)).join("")}</div>
    </div>
  ` : "";

  // 削除済みメンバー（復元可能）
  const deletedList = (state.deletedMembers || []);
  const deletedSection = deletedList.length > 0 ? `
    <div style="margin-top:24px;padding-top:16px;border-top:1px dashed var(--border)">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">退会者（${deletedList.length}名・クリックで復元）</div>
      <div class="unassigned-list">
        ${deletedList.map(n => `<span class="chip editor-only" style="background:#f0eee7;color:var(--muted);cursor:pointer" onclick="restoreMember('${n}')" title="復元">↻ ${escapeHtml(n)}</span>`).join("")}
      </div>
    </div>
  ` : "";

  const filterNote = [allFilterArea, assignDef && assignDef.label, allFilterSkill].filter(Boolean).join(" / ");
  const titleText = filterNote
    ? `全メンバー（${filtered.length} / 総${Object.keys(map).length}名） — ${filterNote}`
    : `全メンバー（${Object.keys(map).length}名）`;
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-head"><div class="card-title">${escapeHtml(titleText)}</div></div>
      <div style="margin-bottom:10px;line-height:2">
        <span style="font-size:12px;color:var(--muted);margin-right:6px">エリア:</span>${areaSummary || '<span style="font-size:12px;color:var(--muted)">なし</span>'}${clearChip}
      </div>
      <div style="margin-bottom:10px;line-height:2">
        <span style="font-size:12px;color:var(--muted);margin-right:6px">アサイン状況:</span>${assignSummary}
        ${allFilterAssign ? ` <span class="tag" style="background:#fff;color:#6b6b6b;border:1px solid #e5e3dc;font-size:12px;padding:6px 12px;cursor:pointer" onclick="onAllAssignChange('${allFilterAssign}')">絞り込みを解除</span>` : ""}
      </div>
      <div style="margin-bottom:0;line-height:2">
        <span style="font-size:12px;color:var(--muted);margin-right:6px">スキル:</span>${skillSummary}
        ${allFilterSkill ? ` <span class="tag" style="background:#fff;color:#6b6b6b;border:1px solid #e5e3dc;font-size:12px;padding:6px 12px;cursor:pointer" onclick="onAllSkillChange('${allFilterSkill}')">絞り込みを解除</span>` : ""}
      </div>
    </div>
    ${cards ? `<div class="grid">${cards}</div>` : '<div class="warn">該当メンバーがいません</div>'}
    ${bsSection}
    ${deletedSection}
  `;
}

// iframe や厳格なブラウザで prompt が動かない環境向けの代替
function inputDialog(title, defaultValue, onOk) {
  openModal(`
    <h3>${escapeHtml(title)}</h3>
    <input id="input-dlg" value="${escapeHtml(defaultValue||"")}" />
    <div class="actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" id="input-ok">OK</button>
    </div>
  `);
  const inp = document.getElementById("input-dlg");
  inp.focus(); inp.select();
  const submit = () => {
    const v = inp.value;
    closeModal();
    onOk(v);
  };
  document.getElementById("input-ok").onclick = submit;
  inp.onkeydown = (e) => { if (e.key === "Enter") submit(); };
}
function confirmDialog(message, onYes) {
  openModal(`
    <h3>${escapeHtml(message)}</h3>
    <div class="actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" id="confirm-ok">OK</button>
    </div>
  `);
  document.getElementById("confirm-ok").onclick = () => { closeModal(); onYes(); };
}

function openModal(html) {
  document.getElementById("modal").innerHTML = html;
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal() { document.getElementById("modal-bg").classList.remove("open"); }

function pickMember(title, onPick, exclude=[]) {
  // state.members と MEMBER_INFO 両方からマージ。削除済みは除外。
  const set = new Set();
  state.members.forEach(n => { if (!isDeleted(n)) set.add(n); });
  Object.keys(MEMBER_INFO).forEach(n => {
    if (isDeleted(n)) return;
    const alt = n.replace(/﨑/g, "崎");
    const alt2 = n.replace(/崎/g, "﨑");
    if (!set.has(n) && !set.has(alt) && !set.has(alt2)) set.add(n);
  });
  const list = [...set]
    .filter(n => !exclude.includes(n))
    .sort((a,b) => a.localeCompare(b,"ja"));
  openModal(`
    <h3>${title}</h3>
    <input id="pick-search" placeholder="検索…" oninput="filterPicks()"/>
    <div id="pick-list">
      ${list.map(n => `<div class="member-pick" data-name="${escapeHtml(n)}" onclick="window.__pick('${n}')">${escapeHtml(n)}</div>`).join("")}
    </div>
    <div style="border-top:1px dashed var(--border);margin-top:8px;padding-top:8px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">一覧にいない場合は新規追加</div>
      <input id="pick-new-name" placeholder="新しいメンバー名を入力"/>
      <button class="btn primary" onclick="window.__addAndPick()" style="width:100%;padding:10px">＋ 新規追加して選択</button>
    </div>
    <div class="actions"><button class="btn" onclick="closeModal()">キャンセル</button></div>
  `);
  window.__pick = (n) => { closeModal(); onPick(n); };
  window.__addAndPick = () => {
    const name = (document.getElementById("pick-new-name").value || "").trim();
    if (!name) return;
    if (!state.members.includes(name)) state.members.push(name);
    closeModal();
    onPick(name);
  };
  window.filterPicks = () => {
    const q = document.getElementById("pick-search").value.trim();
    document.querySelectorAll("#pick-list .member-pick").forEach(el => {
      el.style.display = (!q || el.dataset.name.includes(q)) ? "" : "none";
    });
  };
}

function addMember() {
  const areaOpts = AREA_LIST.map(a => `<option value="${a}">${a}</option>`).join("");
  openModal(`
    <h3>新メンバーを登録</h3>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">名前 <span style="color:var(--pink-text)">*</span></label>
    <input id="nm-name" placeholder="氏名"/>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">大学名</label>
    <input id="nm-univ" placeholder="例：京都大学"/>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">エリア</label>
    <select id="nm-area">
      <option value="">（未設定）</option>
      ${areaOpts}
    </select>
    <div class="actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" id="nm-ok">登録</button>
    </div>
  `);
  const nameInput = document.getElementById("nm-name");
  nameInput.focus();
  const submit = () => {
    const name = (document.getElementById("nm-name").value || "").trim();
    if (!name) return;
    if (state.members.includes(name)) { alert("既に存在します"); return; }
    const univ = (document.getElementById("nm-univ").value || "").trim();
    const area = document.getElementById("nm-area").value;
    state.members.push(name);
    if (univ || area) {
      if (!state.memberOverrides) state.memberOverrides = {};
      state.memberOverrides[name] = { university: univ, area: area };
    }
    save(); closeModal(); render();
  };
  document.getElementById("nm-ok").onclick = submit;
  nameInput.onkeydown = (e) => { if (e.key === "Enter") document.getElementById("nm-univ").focus(); };
}
function deleteMember(name) {
  confirmDialog(`${name} を退会扱いにしますか？（全アサインから除外します。退会者リストから復元可能）`, () => {
    state.members = state.members.filter(n => n !== name);
    // MEMBER_INFO由来でも非表示にできるよう削除リストに追加
    if (!state.deletedMembers) state.deletedMembers = [];
    if (!state.deletedMembers.includes(name)) state.deletedMembers.push(name);
    state.projects.forEach(p => {
      p.mentors = p.mentors.filter(m => m.name !== name);
      p.students = p.students.filter(m => m.name !== name);
      if (p.groups) p.groups.forEach(g => { g.members = g.members.filter(m => m.name !== name); });
    });
    state.departments.forEach(d => {
      if (d.lead) d.lead = d.lead.filter(m => m.name !== name);
      if (d.groups) d.groups.forEach(g => {
        g.members = g.members.filter(m => m.name !== name);
        if (g.subGroups) g.subGroups.forEach(sg => { sg.members = sg.members.filter(m => m.name !== name); });
      });
    });
    (state.schools||[]).forEach(s => {
      if (s.tl === name) s.tl = "";
      if (s.subTl === name) s.subTl = "";
      s.students = s.students.filter(n => n !== name);
    });
    state.onboarding = state.onboarding.filter(n => n !== name);
    state.unassigned = state.unassigned.filter(n => n !== name);
    if (state.memberOverrides && state.memberOverrides[name]) delete state.memberOverrides[name];
    save(); render();
  });
}
function restoreMember(name) {
  if (!state.deletedMembers) return;
  state.deletedMembers = state.deletedMembers.filter(n => n !== name);
  if (!state.members.includes(name) && !MEMBER_INFO[name]) {
    state.members.push(name);
  }
  save(); render();
}
const CONTRACT_STATUSES = ["none", "sent", "nda"];
const CONTRACT_STATUS_LABELS = { none: "未締結", sent: "契約書送付済み", nda: "NDA締結済み" };
const CONTRACT_STATUS_STYLES = {
  none: "background:#fff;color:#6b6b6b;border:1px solid #e5e3dc",
  sent: "background:var(--orange);color:var(--orange-text)",
  nda: "background:var(--green,#e6f4ea);color:var(--green-text,#2f7d4a)"
};
function contractStatusTagHTML(name, status) {
  const s = CONTRACT_STATUSES.includes(status) ? status : "none";
  const icon = s === "nda" ? "✅ " : s === "sent" ? "📤 " : "";
  return `<span class="tag editable" style="${CONTRACT_STATUS_STYLES[s]}" onclick="cycleContractStatus('${name}')" title="クリックで次のステータスへ">${icon}${CONTRACT_STATUS_LABELS[s]}</span>`;
}
function cycleContractStatus(name) {
  const current = memberInfo(name) || {};
  const currentStatus = CONTRACT_STATUSES.includes(current.contractStatus) ? current.contractStatus : "none";
  const nextStatus = CONTRACT_STATUSES[(CONTRACT_STATUSES.indexOf(currentStatus) + 1) % CONTRACT_STATUSES.length];
  if (!state.memberOverrides) state.memberOverrides = {};
  state.memberOverrides[name] = Object.assign(
    { university: "", area: "", experience: "", skills: "", canDo: "", wantToDo: "" },
    current,
    { contractStatus: nextStatus }
  );
  save(); render();
}

// 契約期間（1年ごとに自動更新）の残り日数。contractStartDate（契約締結日 or 直近更新日）を起算点に、
// 今日以降で最も近い「毎年の応当日」を次回更新日とみなして計算する。
function contractRenewalInfo(contractStartDate) {
  if (!contractStartDate) return null;
  const start = new Date(contractStartDate + "T00:00:00");
  if (isNaN(start.getTime())) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let next = new Date(today.getFullYear(), start.getMonth(), start.getDate());
  if (next < today) next.setFullYear(next.getFullYear() + 1);
  const days = Math.round((next - today) / 86400000);
  const nextLabel = `${next.getFullYear()}/${next.getMonth()+1}/${next.getDate()}`;
  return { days, nextLabel };
}
function contractRemainingHTML(contractStartDate) {
  const info = contractRenewalInfo(contractStartDate);
  const value = info ? `残り${info.days}日（次回更新日: ${info.nextLabel}）` : "";
  return `
    <div class="section-label">残り契約期間</div>
    <div style="font-size:13px;line-height:1.6;margin-bottom:10px;color:${value ? "var(--text)" : "var(--muted)"}">${value ? escapeHtml(value) : "未設定"}</div>
  `;
}
function editMember(name) {
  const current = memberInfo(name) || { university: "", area: "" };

    <select id="em-area">

      ${areaOpts}
    </select>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">名前</label>
    <input id="em-name" value="${escapeHtml(name)}" placeholder="名前を変更する場合のみ書き換え"/>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">契約開始日（1年ごとに自動更新）</label>
    <input id="em-contract-start" type="date" value="${escapeHtml(current.contractStartDate||"")}"/>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">経験</label>
    <textarea id="em-experience" rows="2" placeholder="これまでの経験（インターン・部活・制作物など）">${escapeHtml(current.experience||"")}</textarea>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">スキル</label>
    <textarea id="em-skills" rows="2" placeholder="得意なスキル（デザイン・プログラミングなど）">${escapeHtml(current.skills||"")}</textarea>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">できること</label>
    <textarea id="em-cando" rows="2" placeholder="今すぐ貢献できること">${escapeHtml(current.canDo||"")}</textarea>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">やりたいこと</label>
    <textarea id="em-wantto" rows="2" placeholder="今後挑戦したいこと">${escapeHtml(current.wantToDo||"")}</textarea>
    <div class="actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" onclick="saveMemberEdit('${name}')">保存</button>
    </div>
  `);
}
function saveMemberEdit(oldName) {
  const univ = (document.getElementById("em-univ").value||"").trim();
  const area = document.getElementById("em-area").value;
  const newName = (document.getElementById("em-name").value||"").trim() || oldName;
  const contractStartDate = document.getElementById("em-contract-start").value || "";
  const experience = (document.getElementById("em-experience").value||"").trim();
  const skills = (document.getElementById("em-skills").value||"").trim();
  const canDo = (document.getElementById("em-cando").value||"").trim();
  const wantToDo = (document.getElementById("em-wantto").value||"").trim();
  if (!state.memberOverrides) state.memberOverrides = {};

  // 名前変更があれば全アサインの参照も更新
  if (newName !== oldName) {
    if (state.memberOverrides[oldName]) {
      state.memberOverrides[newName] = state.memberOverrides[oldName];
      delete state.memberOverrides[oldName];
    }
    state.members = state.members.map(n => n === oldName ? newName : n);
    if (!state.members.includes(newName) && !MEMBER_INFO[newName]) state.members.push(newName);
    state.projects.forEach(p => {
      p.mentors.forEach(m => { if (m.name === oldName) m.name = newName; });
      p.students.forEach(m => { if (m.name === oldName) m.name = newName; });
      if (p.groups) p.groups.forEach(g => g.members.forEach(m => { if (m.name === oldName) m.name = newName; }));
    });
    state.departments.forEach(d => {
      if (d.lead) d.lead.forEach(m => { if (m.name === oldName) m.name = newName; });
      if (d.groups) d.groups.forEach(g => {
        g.members.forEach(m => { if (m.name === oldName) m.name = newName; });
        if (g.subGroups) g.subGroups.forEach(sg => sg.members.forEach(m => { if (m.name === oldName) m.name = newName; }));
      });
    });
    (state.schools||[]).forEach(s => {
      if (s.tl === oldName) s.tl = newName;
      if (s.subTl === oldName) s.subTl = newName;
      s.students = s.students.map(n => n === oldName ? newName : n);
    });
    state.onboarding = state.onboarding.map(n => n === oldName ? newName : n);
    state.unassigned = state.unassigned.map(n => n === oldName ? newName : n);
  }

  // プロフィール情報のoverride保存（契約状況・BSバッジは編集フォーム対象外なので保持する）
  const contractStatus = (state.memberOverrides[newName] || {}).contractStatus;
  const isBS = (state.memberOverrides[newName] || {}).isBS;
  if (!univ && !area && !contractStartDate && !experience && !skills && !canDo && !wantToDo && !contractStatus && !isBS) {
    delete state.memberOverrides[newName];
  } else {
    state.memberOverrides[newName] = { university: univ, area: area, contractStartDate, experience, skills, canDo, wantToDo, contractStatus, isBS };
  }
  save(); closeModal(); render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ====== 閲覧モードの編集ロック ======
// CSSで隠すだけでなく、編集系の関数自体を無効化して操作不能にする。
// 万一ボタンが表示されてもクリックは何も起こらない（完全な読み取り専用）。

  "addProject","editProject","saveProject","deleteProject","addToProject","removeFromProject",
  "addProjectGroup","deleteProjectGroup","renameProjectGroup","addProjectGroupMember",
  "removeProjectGroupMember",
  "addDept","renameDept","addDeptLead","removeDeptLead",
  "addGroup","deleteGroup","renameGroup","addGroupMember","removeGroupMember",
  "addSubGroup","deleteSubGroup","renameSubGroup","addSubGroupMember","removeSubGroupMember",
  "addSchool","deleteSchool","setSchoolLead","addSchoolStudent","removeSchoolStudent",
  "addToList","removeFromList",
  "addMember","editMember","saveMemberEdit","deleteMember","restoreMember",
  "editSlotMember","saveSlotMember","reorderItem",
  "cycleContractStatus",
  "addCustomTab","deleteCustomTab",
  "addKpiDept","renameKpiDept","addKpiDeptLead","removeKpiDeptLead",
  "addKpiGroup","renameKpiGroupNode","deleteKpiGroupNode","addKpiGroupNodeMember","removeKpiGroupNodeMember","addKpiGroupNodeChild",
  "resetData",
];
if (!isEditMode) {
  EDIT_FNS.forEach(fn => {
    if (typeof window[fn] === "function") {
      window[fn] = function () { /* 閲覧モードでは編集不可 */ };
    }
  });
}
